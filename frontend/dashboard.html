<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>StaunchBot Dashboard</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --ink: #0f172a;
      --muted: #475569;
      --line: #dbe3ee;
      --brand: #0f766e;
      --brand-dark: #115e59;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    .wrap {
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 16px;
    }
    .header h1 {
      margin: 0 0 6px;
      font-size: 26px;
    }
    .header p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }
    .header .links {
      margin-top: 8px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .header a {
      color: var(--brand-dark);
      text-decoration: none;
      font-weight: 600;
      font-size: 13px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 6px 10px;
    }
    .grid {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 14px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(2, 6, 23, 0.05);
    }
    .card h2 {
      margin: 0 0 10px;
      font-size: 16px;
    }
    .row {
      display: grid;
      gap: 6px;
      margin-bottom: 10px;
    }
    .inline {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .inline > * { flex: 1 1 140px; }
    label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
    }
    input, textarea {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
    }
    textarea {
      min-height: 94px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
    }
    button {
      border: 0;
      border-radius: 8px;
      padding: 9px 12px;
      background: var(--brand);
      color: #fff;
      cursor: pointer;
      font-weight: 600;
    }
    button.alt { background: #334155; }
    .out {
      margin-top: 8px;
      font-size: 12px;
      background: #0b1220;
      color: #dbeafe;
      border-radius: 8px;
      padding: 10px;
      white-space: pre-wrap;
      min-height: 56px;
    }
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 8px;
      margin-top: 10px;
    }
    .kpi {
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      background: #f8fafc;
      padding: 8px;
    }
    .kpi .k {
      font-size: 11px;
      color: #64748b;
    }
    .kpi .v {
      font-size: 18px;
      font-weight: 800;
      color: #0f172a;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>Main Dashboard</h1>
      <p>Tenant-facing overview for day-to-day health checks.</p>
      <p id="whoamiLine">Current User: not authenticated</p>
      <div class="links">
        <a href="./tenant-console.html">Open Ops Console</a>
        <a href="./tenant-setup.html">Open Setup Console</a>
      </div>
    </div>

    <div class="grid">
      <section class="card">
        <h2>Session</h2>
        <div class="row">
          <label for="apiBase">API Base</label>
          <input id="apiBase" value="http://localhost:8000" />
        </div>
        <div class="inline">
          <button id="btnEnvProd" class="alt">Use Prod</button>
          <button id="btnEnvStaging" class="alt">Use Staging</button>
          <button id="btnEnvLocal" class="alt">Use Local</button>
        </div>
        <div class="row">
          <label for="stagingApiBase">Staging API Base</label>
          <input id="stagingApiBase" placeholder="https://your-staging-api.up.railway.app" />
        </div>
        <div class="row">
          <label for="accessToken">Access Token</label>
          <textarea id="accessToken" placeholder="Bearer token (auto-set after login)"></textarea>
        </div>
        <div class="inline">
          <button id="saveToken" class="alt">Save Token</button>
          <button id="clearToken" class="alt">Clear Token</button>
        </div>
      </section>

      <section class="card">
        <h2>Login</h2>
        <div class="row"><label>Email</label><input id="lgEmail" value="" placeholder="admin@example.com" /></div>
        <div class="row"><label>Password</label><input id="lgPassword" value="" placeholder="Enter password" /></div>
        <div class="row" id="lgTenantIdRow" style="display:none;">
          <label>Tenant ID (if email is used by multiple tenants)</label>
          <input id="lgTenantId" value="" placeholder="t_..." />
        </div>
        <button id="btnLogin">Login</button>
        <div id="outLogin" class="out"></div>
      </section>

      <section class="card">
        <h2>Tenant Snapshot</h2>
        <button id="btnRefreshAll">Refresh Snapshot</button>
        <div id="outSnapshot" class="out"></div>
        <div id="kpiGrid" class="kpi-grid" style="display:none;"></div>
      </section>
    </div>
  </div>

  <script src="./scripts/dashboard.js"></script>
</body>
</html>
